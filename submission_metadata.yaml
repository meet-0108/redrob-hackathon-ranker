ai_usage_summary: |
  Used Gemini for code review, edge-case debugging, and architectural discussion. Used Cursor for code structuring and refactoring. No candidate dataset rows or records were transmitted over external networks or API endpoints during evaluation pipeline processing.

# ============================================================================
# Approach summary 
# ============================================================================
methodology_summary: |
  Rule-based semantic ranking engine utilizing a TF-IDF matrix computation layer, directly coupled with an explicit, multi-tier non-linear multiplier suite designed around the official Redrob Behavioral Signals. The algorithm enforces robust anti-honeypot text validations by penalizing non-technical roles that exhibit artificial keyword stuffing. Consulting and service-firm exclusions are applied deterministically to isolate top-tier engineering talent matching the Series A Founding team profile. Tie-breakers resolve utilizing an alphanumeric candidate_id ascending fallback sequence, truncated strictly to a top-100 evaluation row limit. Runtime takes less than 3 seconds on a basic local CPU environment.

